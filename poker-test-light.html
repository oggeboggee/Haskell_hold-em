<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Server — Test Client</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f3;
    color: #1a1a1a;
    padding: 1.25rem;
    min-height: 100vh;
  }

  h1 {
    font-size: 0.8rem;
    font-weight: 500;
    color: #999;
    margin-bottom: 1rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    max-width: 1100px;
  }

  .panel {
    background: #fff;
    border: 1px solid #e8e8e5;
    border-radius: 10px;
    padding: 1rem 1.1rem;
  }

  .panel-title {
    font-size: 0.68rem;
    font-weight: 600;
    color: #bbb;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  /* Connection bar */
  .conn-bar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
    max-width: 1100px;
  }

  .conn-bar input {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 7px;
    color: #1a1a1a;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 0.82rem;
    padding: 0.45rem 0.7rem;
    flex: 1;
  }

  .conn-bar input:focus { outline: 2px solid #c8d8f0; border-color: #7aabea; }

  button {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 7px;
    color: #333;
    font-family: inherit;
    font-size: 0.8rem;
    padding: 0.42rem 0.9rem;
    cursor: pointer;
    white-space: nowrap;
    font-weight: 500;
  }

  button:hover { background: #f7f7f5; border-color: #ccc; }
  button:active { background: #f0f0ee; transform: scale(0.98); }
  button:disabled { opacity: 0.35; cursor: default; transform: none; }

  button.primary { background: #eef4fd; border-color: #b5d0f5; color: #2a6abf; }
  button.primary:hover { background: #e2edfc; }
  button.danger  { background: #fdf0f0; border-color: #f5c0c0; color: #b83232; }
  button.danger:hover  { background: #fce6e6; }
  button.action  { background: #f2faf4; border-color: #b5dfc0; color: #2a7a45; }
  button.action:hover  { background: #e6f6ea; }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #ddd;
    flex-shrink: 0;
  }
  .dot.connected    { background: #4caf7d; }
  .dot.connecting   { background: #e6a817; }
  .dot.disconnected { background: #e05252; }

  .status-text { font-size: 0.75rem; color: #aaa; }

  /* Log */
  #log {
    height: 300px;
    overflow-y: auto;
    font-size: 0.72rem;
    line-height: 1.65;
    font-family: "SF Mono", "Fira Code", monospace;
  }

  .log-entry { display: flex; gap: 0.5rem; padding: 1px 0; }
  .log-time  { color: #ccc; flex-shrink: 0; }
  .log-dir   { flex-shrink: 0; width: 1.4rem; font-weight: 600; }
  .log-dir.recv { color: #4caf7d; }
  .log-dir.sent { color: #5a8fd4; }
  .log-dir.info { color: #bbb; }
  .log-dir.err  { color: #e05252; }
  .log-msg   { color: #444; word-break: break-all; white-space: pre-wrap; }

  hr { border: none; border-top: 1px solid #f0f0ee; margin: 0.75rem 0; }

  /* Controls */
  .field-row {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 0.5rem;
  }

  .field-row label {
    font-size: 0.72rem;
    color: #aaa;
    font-weight: 500;
    width: 5rem;
    flex-shrink: 0;
  }

  .field-row input {
    background: #fafafa;
    border: 1px solid #e0e0de;
    border-radius: 6px;
    color: #1a1a1a;
    font-family: inherit;
    font-size: 0.82rem;
    padding: 0.35rem 0.6rem;
    flex: 1;
  }

  .field-row input:focus { outline: 2px solid #c8d8f0; border-color: #7aabea; }

  .btn-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 0.6rem;
  }

  /* Snapshot */
  #snapshot { font-size: 0.8rem; }

  .snap-meta {
    display: flex;
    gap: 1rem;
    margin-bottom: 0.75rem;
    flex-wrap: wrap;
  }

  .snap-pill {
    background: #f5f5f3;
    border: 1px solid #e8e8e5;
    border-radius: 20px;
    padding: 0.2rem 0.7rem;
    font-size: 0.72rem;
    color: #666;
    font-weight: 500;
  }

  .snap-pill span { color: #1a1a1a; font-weight: 600; }

  .snap-board {
    display: flex;
    gap: 0.35rem;
    flex-wrap: wrap;
    margin-bottom: 0.75rem;
    min-height: 2rem;
    align-items: center;
  }

  .card {
    background: #fff;
    border: 1.5px solid #ddd;
    border-radius: 5px;
    padding: 0.25rem 0.55rem;
    font-size: 0.85rem;
    font-weight: 600;
    color: #222;
    font-family: "SF Mono", monospace;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }

  .card.hearts, .card.diamonds { color: #d63030; border-color: #f5c0c0; background: #fff8f8; }

  .no-cards { color: #ccc; font-size: 0.75rem; }

  /* Player rows */
  .players-table { width: 100%; border-collapse: collapse; }

  .players-table th {
    font-size: 0.65rem;
    font-weight: 600;
    color: #bbb;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    text-align: left;
    padding: 0 0.4rem 0.4rem;
    border-bottom: 1px solid #f0f0ee;
  }

  .players-table th:not(:first-child) { text-align: right; }

  .players-table td {
    padding: 0.4rem 0.4rem;
    border-bottom: 1px solid #f7f7f5;
    font-size: 0.78rem;
    vertical-align: middle;
  }

  .player-name-cell { font-weight: 500; color: #222; }
  .player-chips-cell { text-align: right; color: #2a7a45; font-weight: 600; font-family: "SF Mono", monospace; }
  .player-in-cell { text-align: right; color: #999; font-family: "SF Mono", monospace; }
  .player-status-cell { text-align: right; }

  .badge-dealer {
    display: inline-block;
    background: #fff8e0;
    border: 1px solid #f0d870;
    color: #9a7a10;
    font-size: 0.6rem;
    font-weight: 700;
    padding: 0.1rem 0.35rem;
    border-radius: 4px;
    margin-left: 0.35rem;
    vertical-align: middle;
  }

  .badge-folded {
    display: inline-block;
    background: #fff0f0;
    border: 1px solid #f5c0c0;
    color: #c04040;
    font-size: 0.6rem;
    font-weight: 600;
    padding: 0.1rem 0.35rem;
    border-radius: 4px;
  }

  .player-hand-cell {
    font-family: "SF Mono", monospace;
    font-size: 0.72rem;
    color: #7aabea;
    text-align: right;
  }

  /* Raw JSON */
  #raw-json {
    height: 160px;
    overflow-y: auto;
    font-size: 0.7rem;
    font-family: "SF Mono", "Fira Code", monospace;
    color: #888;
    white-space: pre-wrap;
    word-break: break-all;
    background: #fafafa;
    border: 1px solid #eee;
    border-radius: 6px;
    padding: 0.5rem 0.6rem;
  }

  textarea {
    background: #fafafa;
    border: 1px solid #e0e0de;
    border-radius: 6px;
    color: #1a1a1a;
    font-family: "SF Mono", monospace;
    font-size: 0.75rem;
    padding: 0.4rem 0.6rem;
    resize: vertical;
    flex: 1;
  }

  textarea:focus { outline: 2px solid #c8d8f0; border-color: #7aabea; }

  .empty-state { color: #ccc; font-size: 0.75rem; }
</style>
</head>
<body>

<h1>♠ Poker Server — Test Client</h1>

<div class="conn-bar">
  <div class="dot disconnected" id="dot"></div>
  <input id="url-input" value="ws://localhost:9160" />
  <button class="primary" id="btn-connect">Connect</button>
  <button class="danger" id="btn-disconnect" disabled>Disconnect</button>
  <span class="status-text" id="status-text">disconnected</span>
</div>

<div class="grid">

  <!-- LOG -->
  <div class="panel">
    <div class="panel-title">Message Log</div>
    <div id="log"><span class="empty-state">No messages yet.</span></div>
  </div>

  <!-- SNAPSHOT -->
  <div class="panel">
    <div class="panel-title">Table Snapshot</div>
    <div id="snapshot"><span class="empty-state">Waiting for snapshot...</span></div>
  </div>

  <!-- CONTROLS -->
  <div class="panel">
    <div class="panel-title">Controls</div>

    <div class="field-row">
      <label>Name</label>
      <input id="field-name" value="Alice" placeholder="player name" />
    </div>

    <div class="btn-row">
      <button class="primary" id="btn-join">Join</button>
      <button class="danger" id="btn-leave">Leave</button>
    </div>

    <hr>

    <div class="field-row">
      <label>Raise</label>
      <input id="field-raise" value="200" type="number" min="1" />
    </div>

    <div class="btn-row">
      <button class="action" id="btn-check">Check</button>
      <button class="action" id="btn-call">Call</button>
      <button class="danger" id="btn-fold">Fold</button>
      <button class="action" id="btn-raise">Raise</button>
      <button id="btn-allin">All-in</button>
    </div>

    <hr>

    <div class="panel-title" style="margin-top:0.25rem">Raw JSON</div>
    <div class="field-row" style="align-items:flex-start; margin-bottom:0">
      <textarea id="field-raw" rows="3" placeholder='{"type":"join","name":"Bob"}'></textarea>
    </div>
    <div class="btn-row">
      <button id="btn-raw">Send raw</button>
      <button id="btn-clear-log">Clear log</button>
    </div>
  </div>

  <!-- RAW JSON -->
  <div class="panel">
    <div class="panel-title">Last Received (raw)</div>
    <div id="raw-json">—</div>
  </div>

</div>

<script>
let ws = null;

const dot        = document.getElementById('dot');
const statusText = document.getElementById('status-text');
const logEl      = document.getElementById('log');
const snapshotEl = document.getElementById('snapshot');
const rawJsonEl  = document.getElementById('raw-json');
const btnConnect    = document.getElementById('btn-connect');
const btnDisconnect = document.getElementById('btn-disconnect');

function ts() {
  return new Date().toTimeString().slice(0, 8);
}

function addLog(dir, msg) {
  const wasEmpty = logEl.querySelector('.empty-state');
  if (wasEmpty) logEl.innerHTML = '';

  const entry = document.createElement('div');
  entry.className = 'log-entry';
  const arrow = dir === 'recv' ? '←' : dir === 'sent' ? '→' : dir === 'err' ? '✕' : '·';
  entry.innerHTML =
    `<span class="log-time">${ts()}</span>` +
    `<span class="log-dir ${dir}">${arrow}</span>` +
    `<span class="log-msg">${escHtml(msg)}</span>`;
  logEl.appendChild(entry);
  logEl.scrollTop = logEl.scrollHeight;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setStatus(state) {
  dot.className = 'dot ' + state;
  statusText.textContent = state;
  btnConnect.disabled    = (state === 'connected' || state === 'connecting');
  btnDisconnect.disabled = (state !== 'connected');
}

function send(obj) {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    addLog('err', 'not connected');
    return;
  }
  const json = JSON.stringify(obj);
  ws.send(json);
  addLog('sent', json);
}

function cardSuit(card) {
  if (!card || card.length < 2) return '';
  const s = card.slice(-1).toUpperCase();
  return s === 'H' ? 'hearts' : s === 'D' ? 'diamonds' : s === 'S' ? 'spades' : 'clubs';
}

function renderSnapshot(data) {
  const players = data.players || [];
  const board   = data.board   || [];
  const phase   = data.phase   || '—';
  const pot     = data.pot     ?? '—';
  const highBet = data.high_bet ?? '—';
  const dealer  = data.dealer  ?? -1;

  let html = `<div class="snap-meta">
    <span class="snap-pill">Phase: <span>${escHtml(phase)}</span></span>
    <span class="snap-pill">Pot: <span>${pot}</span></span>
    <span class="snap-pill">High bet: <span>${highBet}</span></span>
  </div>`;

  html += `<div class="snap-board">`;
  if (board.length === 0) {
    html += `<span class="no-cards">No board cards yet</span>`;
  } else {
    board.forEach(c => {
      html += `<span class="card ${cardSuit(c)}">${escHtml(c)}</span>`;
    });
  }
  html += `</div>`;

  if (players.length === 0) {
    html += `<p class="empty-state">No players seated.</p>`;
  } else {
    html += `<table class="players-table">
      <thead><tr>
        <th>Player</th>
        <th>Hand</th>
        <th>In</th>
        <th>Chips</th>
        <th>Status</th>
      </tr></thead><tbody>`;

    players.forEach((p, i) => {
      const isDealer = i === dealer;
      const hand = p.hand ? p.hand.join(' ') : null;

      html += `<tr>
        <td class="player-name-cell">
          ${escHtml(p.name)}
          ${isDealer ? '<span class="badge-dealer">D</span>' : ''}
        </td>
        <td class="player-hand-cell">${hand ? escHtml(hand) : '—'}</td>
        <td class="player-in-cell">${p.committed ?? p.commited ?? 0}</td>
        <td class="player-chips-cell">${p.chips}</td>
        <td class="player-status-cell">${p.folded ? '<span class="badge-folded">folded</span>' : ''}</td>
      </tr>`;
    });

    html += `</tbody></table>`;
  }

  snapshotEl.innerHTML = html;
}

function handleMessage(raw) {
  let data;
  try {
    data = JSON.parse(raw);
    rawJsonEl.textContent = JSON.stringify(data, null, 2);
  } catch {
    addLog('err', 'could not parse JSON: ' + raw);
    return;
  }

  const type = data.type || '?';

  switch (type) {
    case 'snapshot':
      renderSnapshot(data);
      addLog('recv', `snapshot — ${(data.players||[]).length} players · phase: ${data.phase} · pot: ${data.pot}`);
      break;
    case 'game_events':
      (data.events || []).forEach(ev => {
        const who    = ev.player ? ev.player : '';
        const amount = ev.amount !== undefined ? ` $${ev.amount}` : '';
        const winners = ev.winners ? ` → ${ev.winners.join(', ')}` : '';
        addLog('recv', `[${ev.type}] ${who}${amount}${winners}`);
      });
      break;
    case 'player_joined':
      addLog('recv', `${data.name} joined the table`);
      break;
    case 'player_left':
      addLog('recv', `${data.name} left the table`);
      break;
    case 'error':
      addLog('err', `server: ${data.message}`);
      break;
    case 'welcome':
      addLog('recv', `welcome, ${data.name}`);
      break;
    default:
      addLog('recv', raw);
  }
}

btnConnect.addEventListener('click', () => {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;
  setStatus('connecting');
  addLog('info', `connecting to ${url}…`);

  ws = new WebSocket(url);

  ws.onopen = () => {
    setStatus('connected');
    addLog('info', 'connected');
  };

  ws.onmessage = evt => handleMessage(evt.data);

  ws.onerror = () => addLog('err', 'websocket error');

  ws.onclose = evt => {
    setStatus('disconnected');
    addLog('info', `disconnected (code ${evt.code})`);
    ws = null;
  };
});

btnDisconnect.addEventListener('click', () => { if (ws) ws.close(); });

document.getElementById('btn-join').addEventListener('click', () => {
  const name = document.getElementById('field-name').value.trim();
  if (name) send({ type: 'join', name });
});

document.getElementById('btn-leave').addEventListener('click', () => send({ type: 'leave' }));
document.getElementById('btn-check').addEventListener('click', () => send({ type: 'action', action: { type: 'check' } }));
document.getElementById('btn-call').addEventListener('click',  () => send({ type: 'action', action: { type: 'call'  } }));
document.getElementById('btn-fold').addEventListener('click',  () => send({ type: 'action', action: { type: 'fold'  } }));
document.getElementById('btn-allin').addEventListener('click', () => send({ type: 'action', action: { type: 'allin' } }));

document.getElementById('btn-raise').addEventListener('click', () => {
  const amt = parseInt(document.getElementById('field-raise').value, 10);
  if (!isNaN(amt) && amt > 0) send({ type: 'action', action: { type: 'raise', amount: amt } });
});

document.getElementById('btn-raw').addEventListener('click', () => {
  const raw = document.getElementById('field-raw').value.trim();
  if (!raw) return;
  try { send(JSON.parse(raw)); }
  catch { addLog('err', 'invalid JSON in raw field'); }
});

document.getElementById('btn-clear-log').addEventListener('click', () => {
  logEl.innerHTML = '<span class="empty-state">Log cleared.</span>';
});

setStatus('disconnected');
</script>
</body>
</html>
